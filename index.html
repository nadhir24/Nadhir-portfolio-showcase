<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nadhir Ghassan | Portfolio</title>
  <meta name="description" content="Nadhir Ghassan - Fullstack Developer Portfolio" />
  <meta name="author" content="Nadhir Ghassan" />

  <link rel="canonical" href="https://nadhirghassan.vercel.app" />

  <meta property="og:title" content="Nadhir Ghassan | Portfolio" />
  <meta property="og:description" content="Nadhir Ghassan - Fullstack Developer Portfolio" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.svg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/og-image.svg" />

  <script>
    (function() {
      try {
        var theme = localStorage.getItem('theme');
        var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
        if (theme === 'dark' || (!theme && supportDarkMode)) {
          document.documentElement.classList.add('dark');
        }
        // Suppress CSS transitions during initial paint to prevent flash
        document.documentElement.classList.add('no-transition');
        window.addEventListener('DOMContentLoaded', function() {
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              document.documentElement.classList.remove('no-transition');
            });
          });
        });
      } catch (e) {}
    })();
  </script>

  <style>
    :root { 
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      --bg-initial: #F5F5F0;
    }
    .dark { --bg-initial: #0E0E0E; }
    body { font-family: var(--font-sans); margin: 0; background: var(--bg-initial); }
    #root { min-height: 100vh; }
    /* Suppress all transitions on initial load to prevent theme flash */
    .no-transition *, .no-transition *::before, .no-transition *::after {
      transition: none !important;
      animation-duration: 0.01ms !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
